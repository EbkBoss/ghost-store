    <div class="status" id="status"></div>
    <div class="hint">After PayPal payment, come here to receive your product instantly.</div>

<script>
document.getElementById('claimForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const product = document.getElementById('product').value;
    const txn = document.getElementById('txn_id').value.trim();
    const status = document.getElementById('status');
    const load = document.getElementById('load');
    const btn = document.getElementById('subBtn');

    if (!email || !product) {
        status.className = 'status err'; status.textContent = 'Fill in email and product.'; status.style.display = 'block';
        return;
    }

    load.style.display = 'block';
    btn.disabled = true;
    status.style.display = 'none';

    const payload = JSON.stringify({email, product, txn_id: txn, source: 'ghost-store'});

    // Try delivery server first
    const servers = [
        'http://localhost:8081/claim',
        'http://localhost:8081/claim',
        'https://ghost-delivery.onrender.com/claim'
    ];

    let delivered = false;
    for (const url of servers) {
        try {
            const resp = await fetch(url, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: payload, signal: AbortSignal.timeout(8000)
            });
            const data = await resp.json();
            if (data.success) {
                delivered = true;
                load.style.display = 'none';
                btn.disabled = false;
                status.className = 'status ok';
                status.innerHTML = '✅ Product sent to <strong>' + email + '</strong>! Check your inbox (spam too).<br>Order: #' + data.order_id;
                status.style.display = 'block';
                break;
            }
        } catch(e) {}
    }

    if (!delivered) {
        load.style.display = 'none';
        btn.disabled = false;
        status.className = 'status warn';
        status.innerHTML = '⚠️ Our delivery system is temporarily offline. Your order has been queued.<br><strong>Email Director at paypal.me/Nicholasram17</strong> with your product name and we will deliver manually within 24 hours.';
        status.style.display = 'block';
        // Queue for later delivery
        try {
            localStorage.setItem('ghost_pending_' + Date.now(), JSON.stringify({email, product, txn, time: new Date().toISOString()}));
        } catch(e) {}
    }
});
</script>
