<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Your Product — Ghost</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{background:#111122;border:1px solid #1e3a5f;border-radius:16px;padding:40px;max-width:500px;width:100%}
h1{color:#00d4ff;font-size:1.8em;margin-bottom:8px}
.sub{color:#8899aa;margin-bottom:25px;font-size:0.95em}
label{display:block;color:#aab;margin-bottom:6px;font-size:0.85em}
input,select{width:100%;padding:12px 16px;background:#0d0d1a;border:1px solid #1e3a5f;border-radius:8px;color:#e0e0e0;font-size:1em;margin-bottom:18px;outline:none}
input:focus,select:focus{border-color:#00d4ff}
.btn{width:100%;padding:14px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);color:#fff;border:none;border-radius:8px;font-size:1.1em;font-weight:bold;cursor:pointer;transition:opacity 0.2s}
.btn:hover{opacity:0.9}
.hint{color:#445;font-size:0.8em;margin-top:10px;text-align:center}
.status{margin-top:15px;padding:12px;border-radius:8px;display:none;text-align:center}
.status-ok{background:#0a2a1a;border:1px solid #00d4ff;color:#00d4ff}
.status-err{background:#2a0a0a;border:1px solid #ff4466;color:#ff4466}
.loading{text-align:center;color:#556;display:none;margin:10px 0}
</style></head><body>
<div class="card">
    <h1>Ghost</h1>
    <div class="sub">Claim your purchase. Enter your email and the product you bought.</div>
    <form id="claimForm">
        <label for="email">Your Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label for="product">Product You Purchased</label>
        <select id="product" required>
            <option value="">— Select product —</option>
            <option value="SaaS Product Launch Playbook — Complete Blueprint">SaaS Product Launch Playbook — Complete Blueprint — $26</option><option value="Freelance Contract and Proposal Pack — 25 Templates">Freelance Contract and Proposal Pack — 25 Templates — $19</option><option value="Copywriting Conversion Pack — 100 Swipe Templates">Copywriting Conversion Pack — 100 Swipe Templates — $27</option><option value="Social Media Domination Pack — 12 Products">Social Media Domination Pack — 12 Products — $97</option><option value="Developer's Money-Making Bundle — 8 Products">Developer's Money-Making Bundle — 8 Products — $177</option><option value="AI Content Empire — 10 Content Products">AI Content Empire — 10 Content Products — $127</option><option value="Time Management System — 25 Templates">Time Management System — 25 Templates — $19</option><option value="Public Speaking Mastery — Complete Blueprint">Public Speaking Mastery — Complete Blueprint — $16</option><option value="Negotiation Skills Pro Pack — 25 Templates">Negotiation Skills Pro Pack — 25 Templates — $21</option><option value="Ghost Protocol Mega Bundle — All 80+ Products">Ghost Protocol Mega Bundle — All 80+ Products — $197</option><option value="Freelancer's Ultimate Toolkit — 10 Products">Freelancer's Ultimate Toolkit — 10 Products — $97</option><option value="Digital Marketing Master Bundle — 12 Products">Digital Marketing Master Bundle — 12 Products — $97</option><option value="Business Automation Suite — 8 Premium Systems">Business Automation Suite — 8 Premium Systems — $147</option><option value="AI Entrepreneur Complete Kit — 15 Premium Products">AI Entrepreneur Complete Kit — 15 Premium Products — $147</option><option value="Prompt Engineering Mastery — 300 Prompts">Prompt Engineering Mastery — 300 Prompts — $23</option><option value="Pitch Deck Template Pack — 25 Investor-Ready Decks">Pitch Deck Template Pack — 25 Investor-Ready Decks — $44</option><option value="Data Analysis with Python — Complete Blueprint">Data Analysis with Python — Complete Blueprint — $27</option><option value="Crypto & Blockchain Basics — Complete Blueprint">Crypto & Blockchain Basics — Complete Blueprint — $14</option><option value="Sales Scripts That Close — 50 Ready-to-Use Scripts">Sales Scripts That Close — 50 Ready-to-Use Scripts — $29</option><option value="Project Management Pro Pack — 25 Templates">Project Management Pro Pack — 25 Templates — $24</option>
        </select>

        <label for="txn_id">PayPal Transaction ID (required — from your PayPal receipt)</label>
        <input type="text" id="txn_id" placeholder="e.g. 9JX12345ABC123456" required pattern="[A-Za-z0-9](10,)" title="Enter the Transaction ID from your PayPal receipt">

        <label for="paypal_email">PayPal Email Used (optional — for backup verification)</label>
        <input type="email" id="paypal_email" placeholder="your-paypal@email.com">

        <button type="submit" class="btn" id="submitBtn">Send My Product</button>
    </form>
    <div class="loading" id="loading">Processing your request...</div>
    <div class="status" id="status"></div>
    <div class="hint">After you pay on PayPal, come here to receive your product instantly.</div>
</div>
<script>
document.getElementById('claimForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const product = document.getElementById('product').value;
    const txn_id = document.getElementById('txn_id').value;
    const paypal_email = document.getElementById('paypal_email').value;
    const status = document.getElementById('status');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');

    if (!email || !product) {
        status.className = 'status status-err';
        status.textContent = 'Please fill in email and product.';
        status.style.display = 'block';
        return;
    }
    if (!txn_id || txn_id.length < 10) {
        status.className = 'status status-err';
        status.textContent = 'Enter your PayPal Transaction ID from your receipt.';
        status.style.display = 'block';
        return;
    }

    loading.style.display = 'block';
    submitBtn.disabled = true;
    status.style.display = 'none';

    try {
        const resp = await fetch('/claim', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, product, txn_id, paypal_email})
        });
        const result = await resp.json();
        loading.style.display = 'none';
        submitBtn.disabled = false;

        if (result.success) {
            status.className = 'status status-ok';
            status.innerHTML = '✅ Product sent! Check your email (including spam folder).<br>Order: #' + result.order_id;
        } else {
            status.className = 'status status-err';
            status.textContent = '❌ ' + (result.error || 'Something went wrong. Email Director at paypal.me/Nicholasram17');
        }
    } catch(e) {
        loading.style.display = 'none';
        submitBtn.disabled = false;
        status.className = 'status status-err';
        status.textContent = '❌ System offline. Email Director at www.paypal.com/paypalme/Nicholasram17 for manual delivery.';
    }
    status.style.display = 'block';
});
</script>

</body></html>
